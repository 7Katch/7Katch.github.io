<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esempio LaTeX in HTML</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <h1>Matematica in HTML</h1>
    
    <p>Questa è una formula in linea: \( a^2 + b^2 = c^2 \), integrata perfettamente nel testo.</p>
    
    <p>Questa invece è una formula in blocco (separata e centrata):</p>
    $$ \int_{a}^{b} f(x) \,dx = F(b) - F(a) $$

</body>
</html>
