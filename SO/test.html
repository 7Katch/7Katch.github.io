<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Motion Canvas</title>
  
  <style>
    body {
      background-color: #0b0f19;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    h1 {
      margin-bottom: 2rem;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .mc-container {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  
  <h1>Test Animazione Motion Canvas</h1>

  <div class="mc-container">
    <motion-canvas-player id="mc-player" src="../animazioni/playground/dist/project.bundled.js" auto-play></motion-canvas-player>
  </div>

  <div style="margin-top: 20px;">
    <button id="btn-avanti" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background: #e13238; color: white; border: none; border-radius: 8px;">Torna Indietro!</button>
  </div>

  <script type="module" src="player.bundle.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const player = document.getElementById('mc-player');
      const btnAvanti = document.getElementById('btn-avanti');

      btnAvanti.addEventListener('click', () => {
        if (player) {
          // Passa allo step successivo sbloccando il waitUntil
          player.requestNextStep();
        }
      }
    });
  </script>

</body>
</html>
